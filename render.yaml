services:
  - type: web
    name: friendly-api
    runtime: node
    plan: starter
    rootDir: services/api
    buildCommand: npm ci
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: friendly-postgres
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: friendly-redis
          property: connectionString

  - type: worker
    name: friendly-worker
    runtime: node
    plan: starter
    rootDir: services/worker
    buildCommand: npm ci
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: friendly-postgres
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: friendly-redis
          property: connectionString
      - key: QUEUE_NAME
        value: default

  - type: web
    name: friendly-dashboard
    runtime: node
    plan: starter
    rootDir: apps/dashboard
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      # Update this after first deploy if Render assigns a different API hostname.
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://friendly-api.onrender.com

databases:
  - name: friendly-postgres
    # Render deprecated legacy Postgres plans like 'starter'.
    # Use a current plan name supported by your Render account (commonly: 'basic').
    plan: basic
    databaseName: friendly
    user: friendly

redis:
  - name: friendly-redis
    plan: starter
    ipAllowList: []
