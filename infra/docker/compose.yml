services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: friendly
      POSTGRES_PASSWORD: friendly
      POSTGRES_DB: friendly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "npm ci || npm install; npm run start"
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://friendly:friendly@postgres:5432/friendly
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    volumes:
      - ../../services/api:/app
    depends_on:
      - postgres
      - redis

  worker:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "npm ci || npm install; npm run start"
    environment:
      DATABASE_URL: postgresql://friendly:friendly@postgres:5432/friendly
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: default
    volumes:
      - ../../services/worker:/app
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
